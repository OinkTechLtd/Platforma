<style>
:root {
  --bg:#080c14; --bg2:#0d1220; --bg3:#141926; --bg4:#1a2133;
  --accent:#ff4040; --text:#f0f4ff; --text2:#8a9bb8; --text3:#4a5a7a;
  --border:#1e2a40; --r:12px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;flex-shrink:0;z-index:50;padding-top:env(safe-area-inset-top,0)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;display:flex;align-items:center;gap:7px;white-space:nowrap;cursor:pointer}
.logo span{color:var(--accent)}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 7px var(--accent);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.h-search{flex:1;position:relative;max-width:340px}
.h-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Manrope';font-size:14px;padding:8px 12px 8px 34px;outline:none}
.h-search input:focus{border-color:var(--accent)}
.h-search .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3)}
.h-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{width:38px;height:38px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover,.icon-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:12px 14px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.sb-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:20px}
.type-pills{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.type-pills::-webkit-scrollbar{display:none}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);white-space:nowrap}
.pill:hover{background:var(--bg4);color:var(--text)}
.pill.on{border-color:var(--accent);color:var(--accent);background:rgba(255,64,64,.08)}
.ch-list{flex:1;overflow-y:auto;padding:6px}
.ch-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:2px}
.ch-item:hover{background:var(--bg3)}
.ch-item.on{background:var(--bg4);border-color:var(--accent)}
.ch-logo{width:42px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:8px;font-weight:700;color:var(--text3)}
.ch-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-meta{font-size:11px;color:var(--text3)}
.live-pip{width:6px;height:6px;background:#3dd68c;border-radius:50%;box-shadow:0 0 5px #3dd68c;animation:blink 2s infinite}
.off-pip{width:6px;height:6px;background:var(--text3);border-radius:50%}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.grid-wrap{flex:1;overflow-y:auto;padding:16px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.card-thumb{height:82px;background:var(--bg4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-thumb img{max-width:70%;max-height:62%;object-fit:contain}
.play-ov{position:absolute;inset:0;background:rgba(255,64,64,0);display:flex;align-items:center;justify-content:center;transition:background .2s}
.card:hover .play-ov{background:rgba(255,64,64,.18)}
.play-ic{width:34px;height:34px;border-radius:50%;background:rgba(255,64,64,.9);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.6);transition:all .2s}
.card:hover .play-ic{opacity:1;transform:scale(1)}
.badge{position:absolute;top:6px;right:6px;background:var(--accent);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px}
.badge.off{background:rgba(255,255,255,.08);color:var(--text3)}
.like-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.6);border-radius:20px;padding:3px 6px;font-size:10px;display:flex;align-items:center;gap:3px;cursor:pointer;z-index:5}
.like-badge:hover{background:rgba(255,64,64,.8)}
.like-badge.liked{color:#ff4444;background:rgba(255,64,64,.3)}
.rbadge{position:absolute;top:6px;left:6px;background:rgba(61,214,140,.12);color:#3dd68c;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;border:1px solid rgba(61,214,140,.3)}
.card-body{padding:8px 10px}
.card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:10px;color:var(--text3)}
.player-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.embed-wrap{width:100%;position:relative;background:#000;flex-shrink:0}
.embed-wrap::after{content:'';display:block;padding-bottom:56.25%}
.embed-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.src-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.src-btn{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);white-space:nowrap}
.src-btn:hover{background:var(--bg4);color:var(--text)}
.src-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pib{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.pib-logo{width:42px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:8px;font-weight:700}
.pib-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.pib-name{font-size:15px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pib-owner{font-size:11px;color:var(--text3)}
.pib-live{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:4px}
.pib-live::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1s infinite}
.pib-off{background:var(--bg4);color:var(--text3);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
.pib-like-btn{background:var(--bg3);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.pib-like-btn.liked{background:rgba(255,64,64,.2);border-color:var(--accent);color:var(--accent)}
.p-related{flex:1;overflow-y:auto;padding:12px 14px;background:var(--bg2)}
.settings-section{background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.settings-section-title{padding:16px 20px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border)}
.setting-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap}
.setting-row:last-child{border-bottom:none}
.setting-label{flex:1}
.sl-title{font-size:13px;font-weight:600}
.sl-desc{font-size:11px;color:var(--text3);margin-top:2px}
.theme-picker{display:flex;gap:8px}
.theme-opt{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.theme-opt.selected{border-color:var(--accent)}
.toggle{width:44px;height:24px;background:var(--bg4);border-radius:12px;cursor:pointer;position:relative}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.accent-picker{display:flex;gap:6px}
.accent-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.accent-opt.selected{border-color:var(--text);transform:scale(1.1)}
.profile-header{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:var(--r);padding:24px;margin-bottom:20px;border:1px solid var(--border);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.profile-avatar{width:70px;height:70px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700}
.profile-stats{display:flex;gap:24px;margin-top:8px}
.pstat{text-align:center}
.pstat-n{font-size:18px;font-weight:700}
.pstat-l{font-size:11px;color:var(--text3)}
.subscriptions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:12px}
.sub-card{background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center;cursor:pointer;border:1px solid var(--border);transition:all .2s;position:relative}
.sub-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.sub-card .remove-like{position:absolute;top:5px;right:8px;background:rgba(0,0,0,.5);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transition:opacity .2s}
.sub-card:hover .remove-like{opacity:1}
.bottom-nav{display:none;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.bn-inner{display:flex;height:56px}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;background:none;border:none}
.bn-tab.on{color:var(--accent)}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70}
.drawer-overlay.open{display:block}
.drawer{position:fixed;left:0;top:0;bottom:0;width:min(320px,85vw);background:var(--bg2);z-index:80;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .3s;padding-top:env(safe-area-inset-top);padding-bottom:var(--safe-bottom)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.drawer-title{font-family:'Bebas Neue';font-size:20px;display:flex;align-items:center;gap:7px}
.drawer-title span{color:var(--accent)}
.drawer-close{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.drawer-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.drawer-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;outline:none}
.drawer-pills{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--border);overflow-x:auto}
.drawer-list{flex:1;overflow-y:auto;padding:6px}
.state-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3)}
.loader{width:36px;height:36px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* TELEGRAM BANNER */
.tg-banner{background:linear-gradient(135deg,#1e2a3a,#0a0f1a);border:1px solid rgba(255,64,64,.3);border-radius:16px;margin-bottom:24px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;cursor:pointer;transition:all .2s}
.tg-banner:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 25px rgba(255,64,64,.2)}
.tg-banner-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tg-icon{width:48px;height:48px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px}
.tg-text h4{font-size:16px;font-weight:800;margin-bottom:4px}
.tg-text h4 span{color:var(--accent)}
.tg-text p{font-size:12px;color:var(--text2);margin:0}
.tg-badge{background:rgba(255,64,64,.2);border:1px solid var(--accent);border-radius:40px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap}
@media(max-width:768px){
  .sidebar{display:none}
  .bottom-nav{display:block}
  .h-search{display:none}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .card-thumb{height:72px}
  .tg-banner{flex-direction:column;text-align:center}
  .tg-banner-left{justify-content:center}
}
</style>
<style>

/* ===== HEADER ===== */

.logo-icon {
  width:32px; height:32px; background:var(--accent);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:16px;
}



</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="location.href='/'"><div class="logo-icon">▶</div>
    <div>
      Платформа<small>by StreamLiveTV</small>
    </div>
  </div>
  <div class="h-search">
    <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="desktopSearch" placeholder="Поиск каналов...">
  </div>
  <div class="h-right">
    <button class="icon-btn" id="btnProfile" onclick="showProfilePage()">👤</button>
    <button class="icon-btn" id="btnSettings" onclick="showSettingsPage()">⚙️</button>
    <button class="icon-btn on" id="btnGrid" onclick="switchView('grid')" style="display:none"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
    <button class="icon-btn" id="btnPlayer" onclick="switchView('player')" style="display:none"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
    <button class="icon-btn" id="btnBurger" onclick="openDrawer()" style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-head"><span class="sb-label">Каналы</span><span class="sb-count" id="sbCount">0</span></div>
    <div class="type-pills"><button class="pill on" onclick="setType('all')">Все</button><button class="pill" onclick="setType('tv')">📺 ТВ</button><button class="pill" onclick="setType('radio')">📻 Радио</button></div>
    <div class="ch-list" id="sidebarList"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<nav class="bottom-nav">
  <div class="bn-inner">
    <button class="bn-tab on" onclick="mobileTab('grid')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Каналы</button>
    <button class="bn-tab" onclick="mobileTab('player')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Плеер</button>
    <button class="bn-tab" onclick="mobileTab('profile')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль</button>
    <button class="bn-tab" onclick="openDrawer()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Список</button>
  </div>
</nav>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head"><div class="drawer-title"><div class="logo-dot"></div>Платформа<span>TV</span></div><button class="drawer-close" onclick="closeDrawer()">✕</button></div>
  <div class="drawer-search"><input type="text" id="mobileSearch" placeholder="Поиск каналов..."></div>
  <div class="drawer-pills"><button class="pill on" onclick="setType('all')">Все</button><button class="pill" onclick="setType('tv')">📺 ТВ</button><button class="pill" onclick="setType('radio')">📻 Радио</button></div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<script>
// ==================== ВСЕ ИСТОЧНИКИ ====================
const SOURCES = [
  { id:'embess', label:'Embess Studio', url: id => `https://embesslivestudio.lovable.app/player?channel=${id}` },
  { id:'native', label:'StreamLiveTV', url: id => `https://bbacesemc33e7hd47kfq.containers.yandexcloud.net/embed/${id}` },
  { id:'embess-new', label:'Embess Vercel', url: id => `https://embesslivestudio.vercel.app/embed/${id}` },

  { id:'flow', label:'Flow Netlify', url: id => `https://stlivetv.netlify.app/embed/${id}` },
  { id:'original', label:'Оригинал', url: id => `https://livestudio-creator.lovable.app/embed/${id}` },
  { id:'namy', label:'namy.sh', url: id => `https://livetv.base44.app/embed?url=https://embesslivestudio.vercel.app/embed/${id}` }
];

// ==================== РЕЗЕРВНЫЕ ДАННЫЕ ====================
const FALLBACK_CHANNELS = [
  { id:"1", name:"Первый канал", slug:"pervyy-kanal", owner:"1tv", type:"tv", live:true, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Channel_One_Russia_2023.svg/200px-Channel_One_Russia_2023.svg.png" },
  { id:"2", name:"Россия 1", slug:"rossiya-1", owner:"russia1", type:"tv", live:true, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Russia-1_2010_logo.svg/200px-Russia-1_2010_logo.svg.png" },
  { id:"3", name:"НТВ", slug:"ntv", owner:"ntv", type:"tv", live:true, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/NTV_logo_2020.svg/200px-NTV_logo_2020.svg.png" },
  { id:"4", name:"ТНТ", slug:"tnt", owner:"tnt", type:"tv", live:false, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/TNT_Logo_2024.svg/200px-TNT_Logo_2024.svg.png" },
  { id:"5", name:"СТС", slug:"sts", owner:"ctc", type:"tv", live:false, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/CTC_Logo_2024.svg/200px-CTC_Logo_2024.svg.png" },
  { id:"6", name:"Матч ТВ", slug:"match-tv", owner:"matchtv", type:"tv", live:true, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Match_TV_logo.svg/200px-Match_TV_logo.svg.png" },
  { id:"7", name:"РЕН ТВ", slug:"ren-tv", owner:"ren", type:"tv", live:false, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/REN_TV_2021_logo.svg/200px-REN_TV_2021_logo.svg.png" },
  { id:"8", name:"Пятый канал", slug:"pyatyy-kanal", owner:"5tv", type:"tv", live:false, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/5_Channel_Russia_logo_2013.svg/200px-5_Channel_Russia_logo_2013.svg.png" },
  { id:"9", name:"Россия 24", slug:"rossiya-24", owner:"russia24", type:"tv", live:true, thumb:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Rossiya_24_logo.svg/200px-Rossiya_24_logo.svg.png" },
  { id:"10", name:"Дом кино Премиум", slug:"dom-kino-premium", owner:"domkino", type:"tv", live:true, thumb:"" },
  { id:"11", name:"Авторадио", slug:"avtoradio", owner:"avtoradio", type:"radio", live:true, thumb:"" },
  { id:"12", name:"Европа Плюс", slug:"evropa-plus", owner:"europaplus", type:"radio", live:true, thumb:"" }
];

let allCh = [], view = [], currentCh = null, curView = 'grid', typeF = 'all', searchQ = '', curSrc = 0;
let userData = JSON.parse(localStorage.getItem('platforma_user') || '{"name":"Зритель","likes":[],"history":[],"settings":{"theme":"dark","accent":"#ff4040"}}');
if(!userData.likes) userData.likes = [];
if(!userData.history) userData.history = [];
let settings = userData.settings || {theme:"dark",accent:"#ff4040"};
function saveUser(){ localStorage.setItem('platforma_user', JSON.stringify(userData)); settings = userData.settings; }

window.onload = async () => {
  setupResponsive();
  applyTheme();
  applyAccent();
  await loadChannels();
  document.getElementById('desktopSearch').addEventListener('input', e => { searchQ = e.target.value.toLowerCase().trim(); applyFilters(); });
  document.getElementById('mobileSearch').addEventListener('input', e => { searchQ = e.target.value.toLowerCase().trim(); applyFilters(); });
  window.addEventListener('resize', setupResponsive);
};

async function loadChannels(){
  const content = document.getElementById('content');
  content.innerHTML = '<div class="state-screen"><div class="loader"></div><span>Загрузка каналов...</span></div>';
  try{
    const response = await fetch('https://aqeleulwobgamdffkfri.supabase.co/functions/v1/public-channels?limit=100', { method:'GET', headers:{'Accept':'application/json'} });
    if(response.ok){
      const json = await response.json();
      let data = json.data || json.channels || json.items || [];
      if(data.length){
        const allowed = ['oinktech','twixoff','adrealine_ukraine','adrealine'];
        allCh = data.filter(ch => { const owner = (ch.owner?.username || ch.owner || '').toLowerCase(); return allowed.some(a => owner.includes(a)); }).map(ch => ({ 
          id: ch.id, 
          name: (ch.title || ch.name || '').trim() || 'Без названия',
          slug: (ch.title || ch.name || '').toLowerCase().replace(/[^a-zа-яё0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || ch.id,
          thumb: ch.thumbnail_url || ch.logo || '', 
          type: ch.channel_type || ch.type || 'tv', 
          live: !!(ch.is_live || ch.live), 
          owner: (typeof ch.owner === 'object' ? ch.owner?.username : ch.owner) || '' 
        }));
      }
    }
  }catch(e){ console.warn('API fallback'); }
  if(!allCh.length) allCh = FALLBACK_CHANNELS;
  currentCh = allCh[0];
  applyFilters();
}

function getChannelSlug(ch){ return ch.slug || ch.name.toLowerCase().replace(/[^a-zа-яё0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || ch.id; }

function isLiked(channelId){ return userData.likes.includes(channelId); }
function toggleLike(channelId, event){ if(event) event.stopPropagation(); const idx = userData.likes.indexOf(channelId); if(idx === -1){ userData.likes.push(channelId); showToast('❤️ Добавлено в избранное'); } else { userData.likes.splice(idx,1); showToast('💔 Убрано из избранного'); } saveUser(); applyFilters(); if(curView === 'player' && currentCh && currentCh.id === channelId) updatePlayerLikeButton(); }

function updatePlayerLikeButton(){ const btn = document.getElementById('playerLikeBtn'); if(btn && currentCh){ if(isLiked(currentCh.id)){ btn.classList.add('liked'); btn.innerHTML = '❤️ В избранном'; } else { btn.classList.remove('liked'); btn.innerHTML = '🤍 В избранное'; } } }

function applyFilters(){
  view = allCh.filter(ch => { if(typeF !== 'all' && ch.type !== typeF) return false; if(searchQ && !ch.name.toLowerCase().includes(searchQ)) return false; return true; });
  document.getElementById('sbCount').textContent = view.length;
  renderSidebarList();
  if(curView === 'grid') renderGrid();
  else if(curView === 'profile') renderProfilePage();
  else if(curView === 'settings') renderSettingsPage();
  else if(currentCh && curView === 'player') renderPlayer(currentCh);
}

function setType(t){ typeF = t; document.querySelectorAll('.pill').forEach(b => b.classList.remove('on')); document.querySelectorAll(`.pill`).forEach(b => { if(b.innerText.includes(t==='tv'?'📺':t==='radio'?'📻':'Все')) b.classList.add('on'); }); applyFilters(); }

function renderSidebarList(){
  ['sidebarList','drawerList'].forEach(id => { const el = document.getElementById(id); if(!el) return; el.innerHTML = ''; view.forEach(ch => { const div = document.createElement('div'); div.className = 'ch-item' + (currentCh?.id === ch.id ? ' on' : ''); div.dataset.id = ch.id; div.innerHTML = `<div class="ch-logo">${ch.thumb ? `<img src="${escapeHtml(ch.thumb)}" onerror="this.style.display='none'">` : escapeHtml(ch.name.slice(0,4))}</div><div class="ch-info"><div class="ch-name">${escapeHtml(ch.name)} ${isLiked(ch.id) ? '❤️' : ''}</div><div class="ch-meta">${ch.type==='radio'?'📻':'📺'} ${escapeHtml(ch.owner || '')}</div></div><div class="${ch.live ? 'live-pip' : 'off-pip'}"></div>`; div.onclick = () => { play(ch); if(isMobile()){ closeDrawer(); mobileTab('player'); } else switchView('player'); }; el.appendChild(div); }); }); }

function makeCard(ch){
  const card = document.createElement('div');
  card.className = 'card';
  const liked = isLiked(ch.id);
  card.innerHTML = `<div class="card-thumb">${ch.thumb ? `<img src="${escapeHtml(ch.thumb)}" onerror="this.remove()">` : `<div class="card-fb">${escapeHtml(ch.name.slice(0,7))}</div>`}<div class="play-ov"><div class="play-ic"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div><div class="badge ${ch.live ? '' : 'off'}">${ch.live ? 'LIVE' : 'OFF'}</div><div class="like-badge ${liked ? 'liked' : ''}" onclick="toggleLike('${ch.id}', event)">${liked ? '❤️' : '🤍'}</div>${ch.type==='radio' ? '<div class="rbadge">RADIO</div>' : ''}</div><div class="card-body"><div class="card-name">${escapeHtml(ch.name)}</div><div class="card-sub">${escapeHtml(ch.owner || '')}</div></div>`;
  card.onclick = (e) => { if(e.target.closest('.like-badge')) return; play(ch); if(isMobile()) mobileTab('player'); else switchView('player'); };
  return card;
}

function renderGrid(){
  const c = document.getElementById('content');
  if(curView !== 'grid') return;
  c.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'grid-wrap';
  
  // Telegram Banner
  const tgBanner = document.createElement('div');
  tgBanner.className = 'tg-banner';
  tgBanner.onclick = () => window.open('https://t.me/platforma_offcial', '_blank');
  tgBanner.innerHTML = `
    <div class="tg-banner-left">
      <div class="tg-icon">📺</div>
      <div class="tg-text">
        <h4>🚀 <span>Национальный видеохостинг Для России и Казахстана «Платформа»</span> 2027</h4>
        <p>Уже на этапе строительства и производства. Подпишись на новости!</p>
      </div>
    </div>
    <div class="tg-badge">📢 t.me/platforma_offcial →</div>
  `;
  wrap.appendChild(tgBanner);
  
  if(!view.length){ wrap.innerHTML += '<div class="state-screen"><span>📺 Каналов не найдено</span></div>'; c.appendChild(wrap); return; }
  const live = view.filter(ch => ch.live);
  const tv = view.filter(ch => !ch.live && ch.type === 'tv');
  const radio = view.filter(ch => !ch.live && ch.type === 'radio');
  [['🔴 В эфире', live], ['📺 Телеканалы', tv], ['📻 Радиостанции', radio]].filter(([,items]) => items.length).forEach(([label, items]) => { const lbl = document.createElement('div'); lbl.className = 'sec-lbl'; lbl.textContent = label; wrap.appendChild(lbl); const grid = document.createElement('div'); grid.className = 'ch-grid'; items.forEach(ch => grid.appendChild(makeCard(ch))); wrap.appendChild(grid); });
  c.appendChild(wrap);
}

function play(ch){
  currentCh = ch;
  const slug = getChannelSlug(ch);
  const newUrl = `/channel/${slug}`;
  window.history.pushState({ channelId: ch.id, slug: slug }, ch.name, newUrl);
  document.title = `${ch.name} — смотреть онлайн | Платформа`;
  let metaDesc = document.querySelector('meta[name="description"]');
  if(metaDesc) metaDesc.setAttribute('content', `Смотрите ${ch.name} в прямом эфире бесплатно. ${ch.type==='radio'?'Радиостанция':'Телеканал'} ${ch.owner}. Национальный видеохостинг Платформа.`);
  userData.history = userData.history.filter(h => h.id !== ch.id);
  userData.history.unshift({ id:ch.id, name:ch.name, owner:ch.owner, thumb:ch.thumb, type:ch.type, slug:slug });
  if(userData.history.length > 50) userData.history.pop();
  saveUser();
  document.querySelectorAll('.ch-item').forEach(el => el.classList.toggle('on', el.dataset.id === ch.id));
  if(curView === 'player') renderPlayer(ch);
  else switchView('player');
}

function renderPlayer(ch){
  const c = document.getElementById('content');
  const embedUrl = SOURCES[curSrc].url(ch.id);
  const liked = isLiked(ch.id);
  c.innerHTML = `<div class="player-view"><div class="embed-wrap"><iframe id="embedFrame" src="${escapeHtml(embedUrl)}" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe></div><div class="src-bar"><span class="src-lbl">🔌 Источники (${SOURCES.length} шт):</span>${SOURCES.map((s,i) => `<button class="src-btn ${i===curSrc ? 'on' : ''}" onclick="switchSrc(${i})">${i===0?'▶':'📡'} ${escapeHtml(s.label)}</button>`).join('')}</div><div class="pib"><div class="pib-logo">${ch.thumb ? `<img src="${escapeHtml(ch.thumb)}" onerror="this.style.display='none'">` : escapeHtml(ch.name.slice(0,3))}</div><div class="pib-name">${escapeHtml(ch.name)}</div><div class="pib-owner">@${escapeHtml(ch.owner || '')}</div><div class="${ch.live ? 'pib-live' : 'pib-off'}">${ch.live ? 'LIVE' : 'OFF'}</div><button id="playerLikeBtn" class="pib-like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${ch.id}', event)">${liked ? '❤️ В избранном' : '🤍 В избранное'}</button></div><div class="p-related"><div class="sec-lbl">📺 Похожие каналы</div><div class="ch-grid" id="relGrid"></div></div></div>`;
  renderRelated(ch);
}

function switchSrc(i){ curSrc = i; const frame = document.getElementById('embedFrame'); if(frame && currentCh) frame.src = SOURCES[i].url(currentCh.id); document.querySelectorAll('.src-btn').forEach((b,idx) => b.classList.toggle('on', idx === i)); showToast(`Источник: ${SOURCES[i].label}`); }

function renderRelated(current){ const el = document.getElementById('relGrid'); if(!el) return; el.innerHTML = ''; view.filter(c => c.id !== current.id).slice(0,12).forEach(ch => el.appendChild(makeCard(ch))); }

function switchView(v){ curView = v; if(v === 'grid') renderGrid(); else if(v === 'player' && currentCh) renderPlayer(currentCh); else if(v === 'profile') renderProfilePage(); else if(v === 'settings') renderSettingsPage(); }

function showProfilePage(){ curView = 'profile'; renderProfilePage(); if(isMobile()) document.querySelectorAll('.bn-tab').forEach(b => b.classList.remove('on')); }
function renderProfilePage(){
  const c = document.getElementById('content');
  const likedChannels = allCh.filter(ch => userData.likes.includes(ch.id));
  c.innerHTML = `<div class="grid-wrap"><div class="profile-header"><div class="profile-avatar">${(userData.name || 'З')[0]}</div><div><div class="pib-name" style="font-size:20px">${escapeHtml(userData.name)}</div><div class="profile-stats"><div class="pstat"><div class="pstat-n">${userData.likes.length}</div><div class="pstat-l">В избранном</div></div><div class="pstat"><div class="pstat-n">${userData.history.length}</div><div class="pstat-l">Просмотров</div></div></div></div></div><div class="settings-section"><div class="settings-section-title">Аккаунт</div><div class="setting-row"><div class="setting-label"><div class="sl-title">Имя пользователя</div></div><input type="text" id="profileNameInput" value="${escapeHtml(userData.name)}" style="background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text)"></div><div class="setting-row"><div class="setting-label"><div class="sl-title">Обратная связь</div></div><button class="src-btn" onclick="sendFeedback()">📧 Отправить отзыв (ginkdev@mail.ru)</button></div></div><div class="settings-section"><div class="settings-section-title">❤️ Избранные каналы (${userData.likes.length})</div><div class="subscriptions-grid" id="profileLikesGrid"></div></div></div>`;
  document.getElementById('profileNameInput').addEventListener('change', e => { userData.name = e.target.value; saveUser(); renderProfilePage(); });
  const grid = document.getElementById('profileLikesGrid');
  if(grid){
    if(!likedChannels.length) grid.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px">Нет избранных каналов. Нажмите 🤍 на канале чтобы добавить</div>';
    else grid.innerHTML = likedChannels.map(ch => `<div class="sub-card" data-id="${ch.id}"><div class="pib-logo" style="margin:0 auto 8px;width:50px;height:35px">${ch.thumb ? `<img src="${ch.thumb}">` : ch.name[0]}</div><div class="card-name">${escapeHtml(ch.name)}</div><div class="card-sub">${ch.type==='radio'?'📻':'📺'}</div><div class="remove-like" onclick="toggleLike('${ch.id}', event)">🗑️</div></div>`).join('');
    document.querySelectorAll('#profileLikesGrid .sub-card').forEach(el => { const ch = likedChannels.find(s => s.id == el.dataset.id); if(ch) el.onclick = (e) => { if(e.target.classList.contains('remove-like')) return; play(ch); }; });
  }
}

function showSettingsPage(){ curView = 'settings'; renderSettingsPage(); }
function renderSettingsPage(){
  const c = document.getElementById('content');
  c.innerHTML = `<div class="grid-wrap"><div class="settings-section"><div class="settings-section-title">🎨 Тема</div><div class="setting-row"><div class="theme-picker"><div class="theme-opt ${settings.theme==='dark'?'selected':''}" style="background:#080c14" onclick="setTheme('dark')"></div><div class="theme-opt ${settings.theme==='light'?'selected':''}" style="background:#f5f5f5" onclick="setTheme('light')"></div><div class="theme-opt ${settings.theme==='amoled'?'selected':''}" style="background:#000" onclick="setTheme('amoled')"></div></div></div><div class="setting-row"><div class="accent-picker"><div class="accent-opt ${settings.accent==='#ff4040'?'selected':''}" style="background:#ff4040" onclick="setAccent('#ff4040')"></div><div class="accent-opt ${settings.accent==='#4285f4'?'selected':''}" style="background:#4285f4" onclick="setAccent('#4285f4')"></div><div class="accent-opt ${settings.accent==='#0f9d58'?'selected':''}" style="background:#0f9d58" onclick="setAccent('#0f9d58')"></div><div class="accent-opt ${settings.accent==='#ff9800'?'selected':''}" style="background:#ff9800" onclick="setAccent('#ff9800')"></div></div></div></div><div class="settings-section"><div class="settings-section-title">🧹 Данные</div><div class="setting-row"><div class="setting-label"><div class="sl-title">Очистить историю</div></div><button class="src-btn" onclick="clearHistory()">Очистить</button></div><div class="setting-row"><div class="setting-label"><div class="sl-title">Очистить избранное</div></div><button class="src-btn" onclick="clearLikes()">Очистить ❤️</button></div></div></div>`;
}
function clearLikes(){ userData.likes = []; saveUser(); showToast('Избранное очищено'); if(curView === 'profile') renderProfilePage(); else if(curView === 'grid') renderGrid(); }
function setTheme(t){ settings.theme = t; userData.settings = settings; saveUser(); applyTheme(); renderSettingsPage(); }
function applyTheme(){ const t = settings.theme || 'dark'; document.documentElement.style.setProperty('--bg', t==='light' ? '#f5f5f5' : t==='amoled' ? '#000' : '#080c14'); document.documentElement.style.setProperty('--bg2', t==='light' ? '#fff' : t==='amoled' ? '#0a0a0a' : '#0d1220'); document.documentElement.style.setProperty('--text', t==='light' ? '#111' : '#f0f4ff'); }
function setAccent(c){ settings.accent = c; userData.settings = settings; saveUser(); document.documentElement.style.setProperty('--accent', c); renderSettingsPage(); showToast('Акцент изменён'); }
function applyAccent(){ document.documentElement.style.setProperty('--accent', settings.accent || '#ff4040'); }
function clearHistory(){ userData.history = []; saveUser(); showToast('История очищена'); if(curView === 'profile') renderProfilePage(); }
function sendFeedback(){ window.location.href = `mailto:ginkdev@mail.ru?subject=[Платформа] Отзыв от ${userData.name}&body=Платформа: Платформа%0AПользователь: ${userData.name}%0A%0AТекст отзыва:%0A`; showToast('Откройте почту для отправки'); }
function showToast(msg){ const t = document.createElement('div'); t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:40px;z-index:9999;font-size:13px'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
function mobileTab(tab){ if(tab === 'grid'){ curView = 'grid'; renderGrid(); } else if(tab === 'player' && currentCh){ curView = 'player'; renderPlayer(currentCh); } else if(tab === 'profile'){ curView = 'profile'; renderProfilePage(); } document.querySelectorAll('.bn-tab').forEach(b => b.classList.remove('on')); }
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); document.body.style.overflow = ''; }
function setupResponsive(){ const m = window.innerWidth <= 768; document.getElementById('btnGrid').style.display = m ? 'none' : 'flex'; document.getElementById('btnPlayer').style.display = m ? 'none' : 'flex'; document.getElementById('btnBurger').style.display = m ? 'flex' : 'none'; }
function isMobile(){ return window.innerWidth <= 768; }
function escapeHtml(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
window.setType = setType; window.play = play; window.switchSrc = switchSrc; window.switchView = switchView; window.toggleLike = toggleLike; window.setTheme = setTheme; window.setAccent = setAccent; window.clearHistory = clearHistory; window.clearLikes = clearLikes; window.sendFeedback = sendFeedback; window.showProfilePage = showProfilePage; window.showSettingsPage = showSettingsPage; window.mobileTab = mobileTab; window.openDrawer = openDrawer; window.closeDrawer = closeDrawer;
window.addEventListener('popstate', (event) => { if(event.state?.channelId){ const ch = allCh.find(c => c.id === event.state.channelId); if(ch) play(ch); } });
</script>
</body>
